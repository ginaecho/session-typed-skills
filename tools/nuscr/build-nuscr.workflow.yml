# Copy of the GitHub Actions workflow used to build the coinductive nuscr
# fork for network-restricted environments. Lives on the fork
# (ginaecho/nuscr_coinduction, branch ci-build) as .github/workflows/build-nuscr.yml;
# kept here for reference. See docs/reference/NUSCR_CLOUD_INSTALL.md.

name: build-nuscr
# Builds the coinductive nuscr fork and pushes the Linux binary to the
# `ci-artifacts` branch (dist/nuscr-linux-x86_64), so environments whose
# network policy blocks opam/Docker Hub can fetch a prebuilt binary over git.
on:
  push:
    branches: [ci-build]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (protobuf needed by ocaml-protoc-plugin)
        run: |
          sudo apt-get update
          sudo apt-get install -y m4 pkg-config libgmp-dev libprotobuf-dev protobuf-compiler

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"

      - name: Build nuscr
        run: |
          opam install -y --deps-only ./nuscr.opam
          opam exec -- dune build -p nuscr @install
          opam exec -- dune install nuscr --prefix=_dist
          _dist/bin/nuscr --version || true
          _dist/bin/nuscr --help | head -20

      - name: Push binary to ci-artifacts branch
        run: |
          BIN=_dist/bin/nuscr
          file "$BIN"
          mkdir -p /tmp/out && cp "$BIN" /tmp/out/nuscr-linux-x86_64
          git config user.name "ci"
          git config user.email "ci@users.noreply.github.com"
          git checkout --orphan ci-artifacts
          git rm -rf --cached . >/dev/null 2>&1 || true
          git clean -fdx -e /tmp || true
          mkdir -p dist && cp /tmp/out/nuscr-linux-x86_64 dist/
          chmod +x dist/nuscr-linux-x86_64
          git add -f dist/nuscr-linux-x86_64
          git commit -m "CI build of nuscr (coinductive fork) [$GITHUB_SHA]"
          git push -f origin ci-artifacts
