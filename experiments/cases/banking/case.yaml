case_id: banking
description: |
  Banking transfer with an amount-dependent approval branch. Tests safety
  invariants under a value-dependent choice and an exception (rejection)
  path — large transfers must route through an Approver before any money
  moves; small transfers skip approval; insufficient funds reject cleanly.

version: v1
protocol_name: BankingTransfer

roles:
  - Initiator
  - SourceBank
  - DestBank
  - Approver
  - AuditLog

terminal_label: Settled
max_steps: 24
branch_hints: [large, small]

role_descriptions:
  Initiator: requests a money transfer of a given amount and receives the final settlement
  SourceBank: holds the source account; decides large vs small vs insufficient-funds, debits on success
  DestBank: holds the destination account; credited only after the source debit is confirmed
  Approver: authorizes or denies large transfers before any money moves
  AuditLog: records the terminal outcome of every transfer and settles back to the initiator

intent: |
  Transfer an amount of money from a source account to a destination account.
  If the amount exceeds $10,000 the transfer requires Approver authorization
  before any money moves. The SourceBank debits the source; the DestBank
  credits the destination; the AuditLog records the final outcome and
  settles back to the initiator. If the SourceBank cannot complete the debit
  (insufficient funds), the transfer fails, no money moves, and the AuditLog
  still records and settles the rejection.

goals:
  - id: G1
    description: The transfer request carries a positive amount
    metric: request_amount
    predicate: float(x) > 0
    anchor: {sender: Initiator, receiver: SourceBank, label: Request}
    threshold: "> 0"

  - id: G2
    description: A large transfer is routed to the Approver for authorization
    metric: approval_routing
    predicate: float(x) > 10000
    anchor: {sender: SourceBank, receiver: Approver, label: LargeTransfer}
    threshold: "> 10000"
    # LargeTransfer exists only on the large branch.
    branch: large

  - id: G3
    description: Every transfer ends with an audit settlement record to the initiator
    metric: settlement_recorded
    predicate: len(x) > 0
    anchor: {sender: AuditLog, receiver: Initiator, label: Settled}
    threshold: non-empty

  - id: G4
    description: A small (no-approval) transfer credits the destination bank
    metric: destination_credited
    predicate: float(x) > 0
    anchor: {sender: DestBank, receiver: AuditLog, label: Credit}
    threshold: "> 0"
    # Credit on the small branch always happens (no approval gate).
    branch: small
