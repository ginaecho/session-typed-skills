# Consequence-grading annotations for the banking case (BENCHMARK_DESIGN.md v2.1).
# The S4 class is native here: Debit is irreversible money movement.
# Note: no 'credit' milestone — the Scribble-validated LLM draft has SourceBank
# debiting directly (no DestBank->AuditLog Credit message), so a credit
# milestone would falsely flag every drafted-vocabulary trial. The core S4
# (money moves before authorization) is what we grade.
milestones:
  - id: request
    match: "Request|InitiateTransfer"
  - id: route_large
    match: "LargeTransfer|HighAmountApproval|ApprovalRequired|RequestApproval"
    branches: [large]
  - id: authorized
    match: "Authorized|Approval|Approved"
    branches: [large]
  - id: debit
    match: "(?<!Notify)(?<!Failure)Debit|Credit"
    branches: [large, small]
  - id: settled
    match: "Settled|Settlement"

chains:
  large: [request, route_large, authorized, debit, settled]
  small: [request, debit, settled]

terminal: settled

irreversible:
  - id: debit
    requires_large: [authorized]   # large: no money moves before authorization
