source_protocol: canonical v1.scr (escrow-first, deadlock-free)
re_anchored_from: case.yaml
n_canonical_goals: 4
n_kept: 4
n_dropped: 0
dropped: []
goals:
- id: G1
  description: The Buyer funds the escrow with a positive amount
  metric: escrow_funded
  predicate: float(x) > 0
  anchor:
    sender: Buyer
    receiver: Escrow
    label: FundEscrow
  threshold: '> 0'
- id: G2
  description: The goods are dispatched by the Seller
  metric: dispatched
  predicate: len(x) >= 0
  anchor:
    sender: Seller
    receiver: Carrier
    label: ShipGoods
  threshold: present
- id: G3
  description: Escrow releases a positive payment to the Seller
  metric: payment_released
  predicate: float(x) > 0
  anchor:
    sender: Escrow
    receiver: Seller
    label: ReleasePayment
  threshold: '> 0'
- id: G4
  description: The settlement terminates (completion delivered to the Buyer)
  metric: settled
  predicate: 'True'
  anchor:
    sender: Escrow
    receiver: Buyer
    label: SettlementComplete
  threshold: terminal event present
