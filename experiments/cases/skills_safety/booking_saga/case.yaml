case_id: booking_saga
description: |
  DEADLOCK / SAGA-ORDERING CASE, sourced from real agent skills. Based on the
  LangGraph supervisor + booking-saga pattern (langchain-ai/langgraph): a
  traveler orchestrator coordinates a hotel-reservation service and a payment
  service to book a stay, with saga-style ordering between reserve and pay.

  Each service's skill is individually sensible but they deadlock together: the
  Hotel service's skill says "don't confirm the room until payment is secured",
  and the Payment service's skill says "don't charge until the room is
  confirmed". Each waits for the other -> circular wait -> the booking never
  completes (the saga hangs). No human reading either skill alone flags it; a
  formal check catches the cycle and forces a reserve-first ordering (hold the
  room, then charge, then confirm) that breaks it.

version: v1
protocol_name: BookingSaga

roles:
  - Traveler
  - Hotel
  - Payment

terminal_label: BookingConfirmed
max_steps: 22
branch_hints: [standard, standard]

role_descriptions:
  Traveler: the orchestrator that requests the booking and receives the final confirmation
  Hotel: holds and confirms the room reservation
  Payment: charges the traveler for the stay

intent: |
  Book a hotel stay. The Traveler requests a booking; the Hotel holds the room
  and the Payment service charges the traveler, coordinating so the room is held
  before payment is captured and the booking is confirmed only once both the room
  is held and payment has succeeded. The traveler must never be charged for a
  room that was never held, and the booking must not hang.

goals:
  - id: G1
    description: The Hotel holds the room before payment is captured
    metric: room_held
    predicate: len(x) > 0
    anchor: {sender: Hotel, receiver: Payment, label: RoomHeld}
    threshold: present
  - id: G2
    description: Payment is captured after the room is held
    metric: paid
    predicate: float(x) > 0
    anchor: {sender: Payment, receiver: Hotel, label: PaymentCaptured}
    threshold: "> 0"
  - id: G3
    description: The booking is confirmed to the traveler
    metric: confirmed
    predicate: 'True'
    anchor: {sender: Hotel, receiver: Traveler, label: BookingConfirmed}
    threshold: terminal event present
