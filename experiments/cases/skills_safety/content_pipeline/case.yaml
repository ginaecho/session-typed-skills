case_id: content_pipeline
description: |
  WRONG-ORDER / SAFETY CASE, sourced from real agent skills. Based on the
  CrewAI content-creation pattern (crewAIInc/crewAI-examples): a Researcher, a
  Writer, and an Editor collaborate to produce a post, followed by a Publisher.
  The real per-agent role prompts describe each agent's job in isolation — the
  Writer "writes a compelling article from the research" and the Publisher
  "publishes the finished article" — but nothing in the Writer's or Publisher's
  own skill forces the Editor's review/approval to happen BEFORE publication.

  Read in isolation the skills let the Writer hand the draft straight to the
  Publisher (or the Publisher publish on first receipt), so an unreviewed,
  potentially inaccurate or non-compliant article goes live. The required order
  is Draft -> Editor Approval -> Publish; the skills do not encode the Approval
  gate. This is the "publish before review" disaster class.

version: v1
protocol_name: ContentPipeline

roles:
  - Researcher
  - Writer
  - Editor
  - Publisher

terminal_label: Published
max_steps: 20
branch_hints: [standard, standard]

role_descriptions:
  Researcher: gathers source material and hands a research brief to the Writer
  Writer: writes the article from the research brief and submits it for editing
  Editor: reviews the draft for accuracy/compliance and approves it before it can be published
  Publisher: publishes the article only after the Editor has approved it

intent: |
  Produce and publish an article. The Researcher briefs the Writer, the Writer
  drafts the article and submits it to the Editor, the Editor reviews and
  approves it, and only then does the Publisher publish it. An article must
  never be published before the Editor has approved it.

goals:
  - id: G1
    description: The Writer submits a draft to the Editor
    metric: draft_submitted
    predicate: len(x) > 0
    anchor: {sender: Writer, receiver: Editor, label: SubmitDraft}
    threshold: present
  - id: G2
    description: The Editor approves the draft before publication
    metric: approved
    predicate: len(x) > 0
    anchor: {sender: Editor, receiver: Publisher, label: Approve}
    threshold: present
  - id: G3
    description: The article is published only after approval
    metric: published
    predicate: 'True'
    anchor: {sender: Publisher, receiver: Editor, label: Published}
    threshold: terminal event present
