source_protocol: canonical v1.scr (escrow-first; LLM also drafted valid + a caught-deadlock
  version, see drafts_log.json)
re_anchored_from: case.yaml
n_canonical_goals: 5
n_kept: 5
n_dropped: 0
dropped: []
goals:
- id: G1
  description: The Buyer funds the escrow with a positive amount before any shipment
  metric: escrow_funded
  predicate: float(x) > 0
  anchor:
    sender: Buyer
    receiver: Escrow
    label: FundEscrow
  threshold: '> 0'
- id: G2
  description: The Seller ships only after being told funds are secured
  metric: ship_after_funds
  predicate: len(x) > 0
  anchor:
    sender: Seller
    receiver: Shipper
    label: DispatchGoods
  threshold: non-empty
- id: G3
  description: The Inspector explicitly passes the delivered goods
  metric: inspection_passed
  predicate: '"pass" in x.lower() or "ok" in x.lower() or "true" in x.lower()'
  anchor:
    sender: Inspector
    receiver: Escrow
    label: InspectionResult
  threshold: contains pass/ok/true
- id: G4
  description: Escrow releases payment to the Seller (only after inspection)
  metric: payment_released
  predicate: float(x) > 0
  anchor:
    sender: Escrow
    receiver: Seller
    label: ReleasePayment
  threshold: '> 0'
- id: G5
  description: The settlement terminates with completion back to the Buyer
  metric: settled
  predicate: 'True'
  anchor:
    sender: Escrow
    receiver: Buyer
    label: SettlementComplete
  threshold: terminal event present
